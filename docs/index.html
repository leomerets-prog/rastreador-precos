<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rastreador de Preços</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>💸</text></svg>" />
</head>
<body>
  <header>
    <h1>💸 Rastreador de Preços</h1>
    <div class="header-info">
      <span id="ultima-coleta">carregando…</span>
      <nav id="links-repo">
        <button id="btn-add" type="button">➕ Adicionar produto</button>
        <a id="link-editar" href="#" target="_blank" rel="noopener" hidden>✏️ Editar produtos</a>
        <a id="link-rodar" href="#" target="_blank" rel="noopener" hidden>🔄 Atualizar agora</a>
      </nav>
    </div>
  </header>
  <section id="cupons-secao" hidden>
    <details id="cupons-det" open>
      <summary><span id="cupons-titulo">🎟️ Cupons ativos</span></summary>
      <div id="cupons"></div>
    </details>
  </section>

  <main id="cards">
    <p class="aviso">Carregando dados…</p>
  </main>

  <dialog id="form-add">
    <form method="dialog" id="form-add-form">
      <h2>Adicionar produto</h2>
      <label>Nome do produto *
        <input name="nome" required placeholder="Ex.: Fone JBL Tune 510BT preto" />
      </label>
      <label>Palavras-chave da busca
        <input name="palavrasChave" placeholder="Ex.: fone jbl tune 510bt (vazio = usa o nome)" />
      </label>
      <label>Palavras obrigatórias <small>(separe por vírgula; o anúncio precisa conter todas)</small>
        <input name="termosObrigatorios" placeholder="Ex.: jbl, 510" />
      </label>
      <div class="linha">
        <label>Preço-alvo (R$) *
          <input name="precoAlvo" type="number" step="0.01" min="0" required placeholder="200" />
        </label>
        <label>Preço mín. <small>(opcional)</small>
          <input name="precoMin" type="number" step="0.01" min="0" placeholder="auto" />
        </label>
        <label>Preço máx. <small>(opcional)</small>
          <input name="precoMax" type="number" step="0.01" min="0" placeholder="auto" />
        </label>
      </div>
      <label>Link da Amazon <small>(opcional)</small>
        <input name="amazonUrl" placeholder="https://www.amazon.com.br/dp/..." />
      </label>
      <label>Senha *
        <input name="senha" type="password" required placeholder="sua senha de administração" />
      </label>
      <p id="form-add-status" class="form-status"></p>
      <div class="form-acoes">
        <button type="button" id="form-add-cancelar">Cancelar</button>
        <button type="submit" id="form-add-enviar">Adicionar</button>
      </div>
    </form>
  </dialog>

  <footer>
    <p>Coleta automática a cada 3 horas (nuvem + PC) · preços: Amazon, Mercado Livre, Zoom, Buscapé · cupons: Pelando, Promobit, Cuponomia</p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
